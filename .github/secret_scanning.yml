# Exclude test fixtures and prompt/scanner training data from GitHub secret
# scanning. These paths intentionally contain FAKE credential-shaped strings
# (e.g. mongodb+srv://user:pass@cluster.mongodb.net) used to verify the
# project's own secret scanner — they are not real secrets.
paths-ignore:
  - "tests/**"
  - "**/tests/**"
  - "**/__tests__/**"
  - "**/*.test.*"
  - "**/*.spec.*"
  - "apps/backend/prompts/**"
  - "apps/backend/security/git_validators.py"
  - "**/*.example"
